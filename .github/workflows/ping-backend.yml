name: Ping Render Backend
on:
  schedule:
    # Runs every 14 minutes to prevent Render from sleeping (Render sleeps after 15 mins of inactivity)
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        # Replace 'https://your-backend-url.onrender.com' with your actual Render backend URL
        run: curl -s https://my-portfolio-backend-vmkc.onrender.com/api/health
